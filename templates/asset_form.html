{% extends "base.html" %}
{% block content %}
<div class="bg-white p-8 rounded shadow max-w-3xl mx-auto">
    <h2 class="text-2xl font-bold mb-6">{% if asset %}Modifier : {{ asset.name }}{% else %}Nouvelle Immobilisation{% endif %}</h2>
    <form action="/assets/save" method="POST" class="grid grid-cols-2 gap-4">
        <div><label>ID Unique *</label><input type="text" name="id" value="{{ asset.id if asset else '' }}" class="border p-2 w-full" required {% if asset %}readonly{% endif %}></div>
        <div><label>Libellé *</label><input type="text" name="name" value="{{ asset.name if asset else '' }}" class="border p-2 w-full" required></div>
        
        <div><label>Compte comptable *</label>
            <select name="account_number" class="border p-2 w-full" required>
                {% for acc in accounts %}<option value="{{ acc.account_number }}" {% if asset and asset.account_number == acc.account_number %}selected{% endif %}>{{ acc.account_number }} - {{ acc.label }}</option>{% endfor %}
            </select>
        </div>
        <div><label>Catégorie</label>
            <select name="category_id" class="border p-2 w-full">
                <option value="">Aucune</option>
                {% for c in categories %}<option value="{{ c.id }}" {% if asset and asset.category_id == c.id %}selected{% endif %}>{{ c.name }}</option>{% endfor %}
            </select>
        </div>
        <div><label>Centre de coût</label>
            <select name="cost_center_id" class="border p-2 w-full">
                <option value="">Aucun</option>
                {% for c in cdc %}<option value="{{ c.id }}" {% if asset and asset.cost_center_id == c.id %}selected{% endif %}>{{ c.name }}</option>{% endfor %}
            </select>
        </div>
        <div><label>Valeur d'acquisition (€) *</label><input type="number" step="0.01" name="acquisition_value" value="{{ asset.acquisition_value if asset else '' }}" class="border p-2 w-full" required></div>
        
        <div><label>Date d'achat *</label><input type="date" name="acquisition_date" value="{{ asset.acquisition_date if asset else '' }}" class="border p-2 w-full" required></div>
        <div><label>Date de mise en service *</label><input type="date" name="service_date" value="{{ asset.service_date if asset else '' }}" class="border p-2 w-full" required></div>
        
        <div><label>Durée Amort. Écon. (ans)</label><input type="number" name="duration_accounting" value="{{ asset.duration_accounting if asset else '0' }}" class="border p-2 w-full"></div>
        <div><label>Durée Amort. Fiscal (ans)</label><input type="number" name="duration_fiscal" value="{{ asset.duration_fiscal if asset else '0' }}" class="border p-2 w-full"></div>
        
        <div><label>Valeur résiduelle (€)</label><input type="number" step="0.01" name="residual_value" value="{{ asset.residual_value if asset else '0.00' }}" class="border p-2 w-full"></div>
        <div class="flex items-end pb-2">
            <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" name="is_amortizable" class="w-5 h-5" {% if not asset or asset.is_amortizable %}checked{% endif %}>
                <span class="font-medium">Amortissable</span>
            </label>
        </div>
        
        <div><label>Méthode Économique *</label>
            <select name="method_accounting" class="border p-2 w-full">
                <option value="linear" {% if asset and asset.method_accounting == 'linear' %}selected{% endif %}>Linéaire</option>
                <option value="degressive" {% if asset and asset.method_accounting == 'degressive' %}selected{% endif %}>Dégressif</option>
            </select>
        </div>
        <div><label>Méthode Fiscale *</label>
            <select name="method_fiscal" class="border p-2 w-full">
                <option value="linear" {% if asset and asset.method_fiscal == 'linear' %}selected{% endif %}>Linéaire</option>
                <option value="degressive" {% if asset and asset.method_fiscal == 'degressive' %}selected{% endif %}>Dégressif</option>
            </select>
        </div>
        
        <div class="col-span-2 mt-4">
            <button type="submit" class="bg-green-600 text-white px-6 py-2 rounded">Enregistrer</button>
            <a href="/assets" class="bg-gray-400 text-white px-6 py-2 rounded ml-2">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
