{% extends "base.html" %}
{% block content %}
<div class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold">Coefficients Dégressifs</h1>
    <a href="/settings" class="bg-gray-400 text-white px-4 py-2 rounded">Retour aux Paramètres</a>
</div>
<div class="bg-white p-6 rounded shadow mb-6">
    <h3 class="font-bold mb-4">Ajouter un coefficient</h3>
    <form action="/degressive/add" method="POST" class="flex gap-2">
        <input type="number" name="min_duration" placeholder="Durée Min (ans)" class="border p-2 rounded w-40" required>
        <input type="number" name="max_duration" placeholder="Durée Max (ans)" class="border p-2 rounded w-40" required>
        <input type="number" step="0.01" name="coefficient" placeholder="Coefficient (ex: 1.75)" class="border p-2 rounded flex-1" required>
        <button class="bg-blue-600 text-white px-4 py-2 rounded">Ajouter</button>
    </form>
</div>
<div class="bg-white p-6 rounded shadow overflow-x-auto">
    <table class="w-full text-sm">
        <thead><tr class="border-b text-left text-gray-500"><th class="py-2 w-32">Durée Min</th><th class="w-32">Durée Max</th><th>Coefficient</th><th class="text-right">Actions</th></tr></thead>
        <tbody>
            {% for r in rules %}
            <tr class="border-b hover:bg-gray-50">
                <td class="py-2 font-bold">
                    <form action="/degressive/edit/{{ r.id }}" method="POST" class="flex gap-2 items-center">
                        <input type="number" name="min_duration" value="{{ r.min_duration }}" class="border p-1 rounded text-sm w-20">
                </td>
                <td>
                        <input type="number" name="max_duration" value="{{ r.max_duration }}" class="border p-1 rounded text-sm w-20">
                </td>
                <td>
                        <input type="number" step="0.01" name="coefficient" value="{{ r.coefficient }}" class="border p-1 rounded text-sm w-24">
                </td>
                <td class="text-right">
                        <button type="submit" class="bg-blue-600 text-white px-3 py-1 rounded text-xs">Modifier</button>
                    </form>
                    <a href="/degressive/delete/{{ r.id }}" class="text-red-600 hover:underline ml-2" onclick="return confirm('Supprimer ce coefficient ?')">Suppr.</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
