{% extends "base.html" %}
{% block content %}
<div class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold">Plan Comptable Général</h1>
    <a href="/settings" class="bg-gray-400 text-white px-4 py-2 rounded">Retour aux Paramètres</a>
</div>
<div class="bg-white p-6 rounded shadow mb-6">
    <h3 class="font-bold mb-4">Ajouter un compte</h3>
    <form action="/pcg/add" method="POST" class="flex gap-2">
        <input type="text" name="account_number" placeholder="Numéro (ex: 218500)" class="border p-2 rounded w-40" required>
        <input type="text" name="label" placeholder="Libellé" class="border p-2 rounded flex-1" required>
        <select name="account_type" class="border p-2 rounded">
            <option value="asset">Immobilisation (Classe 2)</option>
            <option value="depreciation">Amortissement (Classe 28/29)</option>
            <option value="special">Spécial (145, 687, 775...)</option>
        </select>
        <button class="bg-blue-600 text-white px-4 py-2 rounded">Ajouter</button>
    </form>
</div>
<div class="bg-white p-6 rounded shadow overflow-x-auto">
    <table class="w-full text-sm">
        <thead><tr class="border-b text-left text-gray-500"><th class="py-2 w-24">Numéro</th><th>Libellé</th><th>Type</th><th class="text-right">Actions</th></tr></thead>
        <tbody>
            {% for a in accounts %}
            <tr class="border-b hover:bg-gray-50">
                <td class="py-2 font-mono font-bold">{{ a.account_number }}</td>
                <td>
                    <form action="/pcg/edit/{{ a.account_number }}" method="POST" class="flex gap-2">
                        <input type="text" name="label" value="{{ a.label }}" class="border p-1 rounded text-sm flex-1 bg-gray-100 text-gray-500" readonly id="in-pcg-{{ a.account_number }}">
                        <select name="account_type" id="sel-pcg-{{ a.account_number }}" class="border p-1 rounded text-xs bg-gray-100 text-gray-500" style="pointer-events: none;">
                            <option value="asset" {% if a.account_type == 'asset' %}selected{% endif %}>Immo</option>
                            <option value="depreciation" {% if a.account_type == 'depreciation' %}selected{% endif %}>Amort</option>
                            <option value="special" {% if a.account_type == 'special' %}selected{% endif %}>Spécial</option>
                        </select>
                        <button type="button" onclick="enableEdit('pcg-{{ a.account_number }}')" id="edit-pcg-{{ a.account_number }}" class="bg-gray-200 text-gray-700 px-3 py-1 rounded text-xs">✎</button>
                        <button type="submit" id="ok-pcg-{{ a.account_number }}" class="bg-green-600 text-white px-3 py-1 rounded text-xs hidden">OK</button>
                    </form>
                </td>
                <td>{{ a.account_type }}</td>
                <td class="text-right">
                    <a href="/pcg/delete/{{ a.account_number }}" class="text-red-600 hover:underline" onclick="return confirm('Supprimer ce compte ?')">Suppr.</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
<script>
    function enableEdit(id) {
        const input = document.getElementById('in-' + id);
        const editBtn = document.getElementById('edit-' + id);
        const okBtn = document.getElementById('ok-' + id);
        const sel = document.getElementById('sel-' + id);
        
        input.removeAttribute('readonly');
        input.classList.remove('bg-gray-100', 'text-gray-500');
        input.classList.add('bg-white', 'text-black');
        
        if(sel) {
            sel.style.pointerEvents = 'auto';
            sel.classList.remove('bg-gray-100', 'text-gray-500');
            sel.classList.add('bg-white', 'text-black');
        }
        
        input.focus();
        editBtn.classList.add('hidden');
        okBtn.classList.remove('hidden');
    }
</script>
{% endblock %}
